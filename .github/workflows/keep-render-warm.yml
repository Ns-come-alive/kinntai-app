name: Keep Render warm

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

env:
  RENDER_HEALTH_URL: https://kinntai-app.onrender.com/healthz

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: curl -fsSL -o /dev/null -w "HTTP %{http_code}" "$RENDER_HEALTH_URL" || true
