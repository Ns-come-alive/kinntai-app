services:
  - type: web
    name: kintai-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /data
    disk:
      name: kintai-data
      mountPath: /data
      sizeGB: 1
